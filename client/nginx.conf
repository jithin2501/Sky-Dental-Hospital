server {
    listen 80;
    server_name skydentalhospital.in www.skydentalhospital.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name skydentalhospital.in www.skydentalhospital.in;

    client_max_body_size 200M;

    ssl_certificate /etc/letsencrypt/live/skydentalhospital.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skydentalhospital.in/privkey.pem;

    # SSL optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html =404;
    }

    location /api {
        proxy_pass http://server:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Increase proxy body limit as well
        client_max_body_size 200M;
    }
}
