version: '3.8'

services:
  # ─── FRONTEND ───────────────────────────────────────────────────────────────────
  client:
    build: 
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - mern-network

  # ─── BACKEND ────────────────────────────────────────────────────────────────────
  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - mern-network

networks:
  mern-network:
    driver: bridge
